<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Expense Tracker</title>
</head>
<body>
<div class="container">
  <h2>บันทึกรายจ่าย</h2>
  
  <input type="text" id="item" placeholder="ชื่อรายการ (เช่น ค่ากาแฟ)">
  <input type="number" id="amount" placeholder="จำนวนเงิน">
  <button id="addBtn">บันทึก</button>

  <h3>รายการทั้งหมด:</h3>
  <ul id="list"></ul>
  <p>ยอดรวม: <span id="total">0</span> บาท</p>

  <button id="clearBtn">ล้างข้อมูลทั้งหมด</button>
</div>

<div class="chart-container">
  <canvas id="expenseChart"></canvas>
</div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="track.js"></script>
</body>
</html>
